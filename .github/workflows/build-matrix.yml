name: Build Matrix

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        config: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: cmake -S . -B build -DUAM_FETCH_DEPS=ON -DUAM_BUILD_TESTS=ON

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure
